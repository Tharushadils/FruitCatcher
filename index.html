<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Catcher Game</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div id="board">

    <h2>Fruit Catcher</h2>

    <p>Score : <span id="score">0</span></p>

    <p>Level : <span id="level">1</span></p>

</div>

<div id="gameArea">

    <div id="basket"></div>

</div>

<div id="levelPanel">

    <button class="levelBtn" data-level="1">Level 1</button>
    <button class="levelBtn" data-level="2">Level 2</button>
    <button class="levelBtn" data-level="3">Level 3</button>
    <button class="levelBtn" data-level="4">Level 4</button>

</div>

<script src="script.js"></script>

</body>
</html>
